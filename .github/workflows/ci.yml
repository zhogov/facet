name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install test dependencies
        run: pip install pytest pytest-asyncio fastapi[standard] httpx pyjwt pillow numpy scipy scikit-learn opencv-python-headless tqdm aiosqlite
      - name: Run tests
        run: python -m pytest --tb=short -q

  angular-tests:
    name: Angular Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: client/package.json
      - run: npm install --no-audit --no-fund
      - run: npm test -- --ci --passWithNoTests

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check api/ tests/ --select E,F,W --ignore E501
      - name: Forbid broken FastAPI auth mock pattern
        run: |
          # Catches both direct ("api.routers.albums.require_edition") and
          # f-string interpolated (f"{_ALBUMS_MODULE}.get_optional_user")
          # forms. Anchored on the auth function name, not the module prefix.
          if grep -rEn 'mock\.patch\([^)]*\.(require_[a-z_]+|get_optional_user)' tests/ ; then
            echo "::error::Found broken Pattern A — mock.patch on module-level FastAPI auth dependencies."
            echo "::error::These patches are no-ops against Depends()-captured references; tests will pass-by-accident."
            echo "Use the conftest fixtures (edition_client / regular_client / superadmin_client / anonymous_client)"
            echo "or app.dependency_overrides[require_edition] = lambda: ... instead. See tests/conftest.py."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: client/package.json
      - run: npm install --no-audit --no-fund
        working-directory: client
      - run: npx ng lint
        working-directory: client
